services:
  - type: web
    name: ark-hygiene-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://arkhygienesolutions.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
