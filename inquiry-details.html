<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Details - ARK Hygiene</title>
    <link rel="stylesheet" href="style.v2.css">
    <style>
        body {
            font-family: 'Ubuntu', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .inquiry-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .inquiry-header {
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .inquiry-header h1 {
            margin: 0;
            color: #000;
        }
        
        .back-button {
            background: #000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .back-button:hover {
            background: #333;
        }
        
        .detail-section {
            margin-bottom: 30px;
        }
        
        .detail-section h3 {
            color: #000;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .detail-label {
            font-weight: 600;
            color: #333;
            min-width: 150px;
        }
        
        .detail-value {
            color: #666;
            flex: 1;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .badge.new {
            background: #10b981;
            color: white;
        }
        
        .badge.in-progress {
            background: #f59e0b;
            color: white;
        }
        
        .badge.responded {
            background: #3b82f6;
            color: white;
        }
        
        .badge.closed {
            background: #6b7280;
            color: white;
        }
        
        .message-box {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary {
            background: #000;
            color: white;
        }
        
        .btn-primary:hover {
            background: #333;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .delivery-info {
            background: #e8f5e8;
            border: 1px solid #10b981;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        .delivery-info h4 {
            margin: 0 0 10px 0;
            color: #10b981;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #fee;
            border: 1px solid #f44;
            color: #c00;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="inquiry-container">
        <a href="admin.html" class="back-button">« Back to Admin Dashboard</a>
        
        <div class="inquiry-header">
            <h1>Inquiry Details</h1>
        </div>
        
        <div id="loadingMessage" class="loading">
            Loading inquiry details...
        </div>
        
        <div id="inquiryContent" style="display: none;">
            <!-- Customer Information Section -->
            <div class="detail-section">
                <h3>Customer Information</h3>
                <div id="customerDetails"></div>
            </div>
            
            <!-- Delivery Information Section -->
            <div class="detail-section">
                <h3>Delivery Information</h3>
                <div id="deliveryDetails"></div>
            </div>
            
            <!-- Product Information Section -->
            <div class="detail-section">
                <h3>Product Information</h3>
                <div id="productDetails"></div>
            </div>
            
            <!-- Message Section -->
            <div class="detail-section">
                <h3>Customer Message</h3>
                <div id="messageContent"></div>
            </div>
            
            <!-- Response Section -->
            <div class="detail-section">
                <h3>Response & Status</h3>
                <div id="responseSection"></div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <button onclick="updateInquiryStatus()" class="btn btn-primary">Update Status</button>
                <button onclick="sendEmail()" class="btn btn-secondary">Send Email</button>
                <button onclick="printInquiry()" class="btn btn-secondary">Print</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Get inquiry ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const inquiryId = urlParams.get('id');
        
        let currentInquiry = null;
        
        // Load inquiry details
        async function loadInquiryDetails() {
            if (!inquiryId) {
                showError('No inquiry ID provided');
                return;
            }
            
            try {
                const response = await api.getInquiry(inquiryId);
                if (response.success && response.data) {
                    currentInquiry = response.data;
                    displayInquiryDetails(response.data);
                } else {
                    showError('Failed to load inquiry details');
                }
            } catch (error) {
                console.error('Error loading inquiry:', error);
                showError('Error loading inquiry details');
            }
        }
        
        function displayInquiryDetails(inquiry) {
            // Hide loading, show content
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('inquiryContent').style.display = 'block';
            
            // Customer Information
            document.getElementById('customerDetails').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Name:</span>
                    <span class="detail-value">${inquiry.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value">${inquiry.email}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Phone:</span>
                    <span class="detail-value">${inquiry.phone || 'Not provided'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Company:</span>
                    <span class="detail-value">${inquiry.company || 'Not provided'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status:</span>
                    <span class="detail-value"><span class="badge ${inquiry.status}">${inquiry.status}</span></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value">${new Date(inquiry.createdAt).toLocaleString()}</span>
                </div>
            `;
            
            // Delivery Information
            const deliveryHtml = inquiry.deliveryLocation ? `
                <div class="delivery-info">
                    <h4>Delivery Location Information</h4>
                    <div class="detail-row">
                        <span class="detail-label">Address:</span>
                        <span class="detail-value">${inquiry.deliveryLocation}</span>
                    </div>
                    ${inquiry.deliveryCity ? `
                    <div class="detail-row">
                        <span class="detail-label">City/Area:</span>
                        <span class="detail-value">${inquiry.deliveryCity}</span>
                    </div>
                    ` : ''}
                </div>
            ` : '<p style="color: #666;">No delivery location provided</p>';
            
            document.getElementById('deliveryDetails').innerHTML = deliveryHtml;
            
            // Product Information
            const productHtml = inquiry.productCategory || inquiry.quantity ? `
                <div class="detail-row">
                    <span class="detail-label">Category:</span>
                    <span class="detail-value">${inquiry.productCategory || 'Not specified'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Quantity:</span>
                    <span class="detail-value">${inquiry.quantity || 'Not specified'}</span>
                </div>
                ${inquiry.urgency ? `
                <div class="detail-row">
                    <span class="detail-label">Urgency:</span>
                    <span class="detail-value">${inquiry.urgency}</span>
                </div>
                ` : ''}
            ` : '<p style="color: #666;">No specific product information</p>';
            
            document.getElementById('productDetails').innerHTML = productHtml;
            
            // Message
            document.getElementById('messageContent').innerHTML = `
                <div class="message-box">${inquiry.message}</div>
            `;
            
            // Response Section
            document.getElementById('responseSection').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Current Status:</span>
                    <span class="detail-value">
                        <select id="statusSelect" style="padding: 5px; border: 1px solid #ddd; border-radius: 3px;">
                            <option value="new" ${inquiry.status === 'new' ? 'selected' : ''}>New</option>
                            <option value="in-progress" ${inquiry.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                            <option value="responded" ${inquiry.status === 'responded' ? 'selected' : ''}>Responded</option>
                            <option value="closed" ${inquiry.status === 'closed' ? 'selected' : ''}>Closed</option>
                        </select>
                    </span>
                </div>
                <div style="margin-top: 15px;">
                    <label for="responseNotes" style="display: block; margin-bottom: 5px; font-weight: 600;">Response Notes:</label>
                    <textarea id="responseNotes" style="width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: vertical;" placeholder="Add response notes or comments...">${inquiry.response || ''}</textarea>
                </div>
            `;
        }
        
        function showError(message) {
            document.getElementById('loadingMessage').innerHTML = `
                <div class="error">${message}</div>
            `;
        }
        
        async function updateInquiryStatus() {
            if (!currentInquiry) return;
            
            const status = document.getElementById('statusSelect').value;
            const response = document.getElementById('responseNotes').value;
            
            try {
                const result = await api.updateInquiry(currentInquiry._id, { status, response });
                if (result.success) {
                    alert('Inquiry updated successfully!');
                    // Reload the page to show updated status
                    loadInquiryDetails();
                } else {
                    alert('Failed to update inquiry: ' + result.message);
                }
            } catch (error) {
                console.error('Error updating inquiry:', error);
                alert('Error updating inquiry');
            }
        }
        
        function sendEmail() {
            if (!currentInquiry) return;
            
            const email = currentInquiry.email;
            const subject = `Re: Your inquiry with ARK Hygiene`;
            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
        }
        
        function printInquiry() {
            window.print();
        }
        
        // Load inquiry when page loads
        document.addEventListener('DOMContentLoaded', loadInquiryDetails);
    </script>
</body>
</html>
